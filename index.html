<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Got Something To Do?</title>
        <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
        <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
        <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    </head>
    <style>
        .list-group-hover .list-group-item:hover {
            background-color: #f5f5f5;
        }
        body {
            padding-top: 0px;
            padding-bottom: 60px;
        }
        .fixed-bottom {
            height: 40px; /* Set the height of your fixed bottom div */
        }
    </style>
    <body>
        <div class="sticky-top mb-4 shadow-sm bg-light" style="--bs-bg-opacity: .95;">
            <div class="container p-2">
                <h2>Todo List</h2>
            </div>
        </div>
        <div id="mydiv" class="container">
        </div>

        <script type="text/babel">
            function createGuid() {
                var S4 = function() {
                return (((1+Math.random())*0x10000)|0).toString(16).substring(1);
                };
                return (S4()+S4()+"-"+S4()+"-"+S4()+"-"+S4()+"-"+S4()+S4()+S4());
            };

            class TodoItem extends React.Component {
                render() {
                    const { item } = this.props;
                    return (
                    <li class="list-group-item d-flex justify-content-between">
                        <div class="d-flex align-items-center">
                            <input type="checkbox" checked={item.done} class="form-check-input me-2 rounded-circle"></input>
                            <label 
                                class="form-check-label stretched-link" 
                                style={{ textDecoration: item.done ? 'line-through' : 'none' }} 
                                onClick={() => this.props.onToggle(item.id)}>
                                {item.name}
                            </label>
                        </div>
                        <button class="btn btn-danger btn-sm" style={{zIndex:1}} onClick={() => this.props.onDelete(item.id)}><i class="bi bi-trash3"></i></button>
                    </li>
                )}
            };

            class TodoList extends React.Component {
                constructor(props) {
                    super(props);
                    this.state = {
                        hidden: true,
                        todos: JSON.parse(localStorage.getItem('todoItems')) || [],
                        newTodoName: ''
                    };
                }

                componentDidUpdate(prevProps, prevState) {
                    // Update localStorage whenever the todos state changes
                    if (prevState.todos !== this.state.todos) {
                        localStorage.setItem('todoItems', JSON.stringify(this.state.todos));
                    }
                }

                handleToggle = (id) => {
                    this.setState((prevState) => ({
                        todos: prevState.todos.map(todo =>
                            todo.id === id ? { ...todo, done: !todo.done } : todo
                        ),
                    }));
                };

                handleDelete = (id) => {
                    this.setState((prevState) => ({
                        todos: prevState.todos.filter(todo => todo.id !== id),
                    }));
                };

                handleAddTodo = () => {
                    const { newTodoName, todos } = this.state;
                    if (newTodoName.trim() === '') return; // Prevent adding empty todos

                    const newTodo = {
                        id: createGuid(),
                        name: newTodoName,
                        done: false,
                    };

                    this.setState((prevState) => ({
                        todos: [...prevState.todos, newTodo],
                        newTodoName: ''
                    }));
                };

                handleInputChange = (event) => {
                    this.setState({ newTodoName: event.target.value });
                };

                handleEnterKey = (event) => {
                    if (event.key === 'Enter') {
                        this.handleAddTodo();
                    }
                };

                handleToggleHidden = () => {
                    this.setState((prevState) => ({
                        hidden: !prevState.hidden,
                    }));
                };

                getChevron = () => {
                    if (this.state.hidden) {
                        return <i class="bi bi-chevron-right"></i>
                    } else {
                        return <i class="bi bi-chevron-down"></i>
                    }
                };

                getDataListOptions = () => {
                    return [...new Set(this.state.todos.map(todo => todo.name))].sort()
                };

                render() {
                    return (
                        <div>
                        <ul class="list-group list-group-hover">
                            {this.state.todos.filter(todo => (todo.done === false)).map(todo => (
                                <TodoItem 
                                    key={todo.id} 
                                    item={todo} 
                                    onToggle={this.handleToggle}
                                    onDelete={this.handleDelete} 
                                />
                            ))}
                        </ul>
                        <button class="btn btn-outline-secondary my-2" id="numItemsCompleted" onClick={this.handleToggleHidden}>
                            {this.getChevron()} Completed {this.state.todos.filter(todo => (todo.done === true)).length}
                        </button>
                        {!this.state.hidden && (
                            <ul class="list-group list-group-hover">
                                {this.state.todos.filter(todo => (todo.done === true)).map(todo => (
                                    <TodoItem 
                                        key={todo.id} 
                                        item={todo} 
                                        onToggle={this.handleToggle} 
                                        onDelete={this.handleDelete} 
                                    />
                                ))}
                            </ul>
                        )}
                        <div class="fixed-bottom bg-white mb-2">
                            <div class="container input-group">
                                <input 
                                    list="itemOptions" 
                                    type="text" 
                                    class="form-control" 
                                    placeholder="Add an item ..." 
                                    value={this.state.newTodoName} 
                                    onChange={this.handleInputChange}
                                    onKeyPress={this.handleEnterKey}
                                />
                                <datalist id="itemOptions">
                                    {this.getDataListOptions().map(opt => (
                                        <option value={opt}/>
                                    ))}
                                </datalist>
                                <button class="btn btn-secondary" type="button" id="saveButton" onClick={this.handleAddTodo}><i class="bi bi-file-arrow-up-fill"></i> Add</button>
                            </div>
                        </div>
                        </div>
                    );
                }
            }

            const container = document.getElementById('mydiv');
            const root = ReactDOM.createRoot(container);
            root.render(<TodoList />)

        </script>

    </body>
</html>

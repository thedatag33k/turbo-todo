<!DOCTYPE html>
<html data-bs-theme="dark">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Got Something To Do?</title>
        <link rel="icon" type="image/x-icon"
            href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="white" class="bi bi-check2-square" viewBox="0 0 16 16">
                <path d="M3 14.5A1.5 1.5 0 0 1 1.5 13V3A1.5 1.5 0 0 1 3 1.5h8a.5.5 0 0 1 0 1H3a.5.5 0 0 0-.5.5v10a.5.5 0 0 0 .5.5h10a.5.5 0 0 0 .5-.5V8a.5.5 0 0 1 1 0v5a1.5 1.5 0 0 1-1.5 1.5z"/>
                <path d="m8.354 10.354 7-7a.5.5 0 0 0-.708-.708L8 9.293 5.354 6.646a.5.5 0 1 0-.708.708l3 3a.5.5 0 0 0 .708 0"/>
              </svg>'>
        <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
        <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
        <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    </head>
    <style>
        .list-group-hover .list-group-item:hover {
            background-color: black;
        }
        body {
            padding-top: 85px;
            padding-bottom: 70px;
        }
        .fixed-bottom {
            height: 40px;
            opacity: .95;
        }
    </style>
    <body>
        <div class="navbar fixed-top shadow bg-dark" style="--bs-bg-opacity: .95;">
            <div class="container py-1">
                <h4 class="m-0"><i class="bi bi-check2-square"></i> Todo List</h4>
                <button class="btn btn-outline-secondary" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasRight" aria-controls="offcanvasRight"><i class="bi bi-three-dots-vertical"></i></button>
            </div>
        </div>
        <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasRight" aria-labelledby="offcanvasRightLabel">
            <div class="offcanvas-header">
                <h5 class="offcanvas-title" id="offcanvasRightLabel">Options</h5>
                <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
            </div>
            <div class="offcanvas-body">
                ...
            </div>
        </div>
        <div id="mydiv" class="container"></div>

        <script type="text/babel">

            function capitalizeFirstLetter(string) {
                return string.charAt(0).toUpperCase() + string.slice(1);
            };

            class TodoItem extends React.Component {
                render() {
                    const { item } = this.props;
                    return (
                    <li class="list-group-item d-flex justify-content-between" style={{height:55}}>
                        <div class="d-flex align-items-center">
                            <input type="checkbox" checked={item.done} class="form-check-input me-2 rounded-circle"></input>
                            <label 
                                class="form-check-label stretched-link" 
                                style={{ textDecoration: item.done ? 'line-through' : 'none' }} 
                                onClick={() => this.props.onToggle(item.id)}>
                                {item.name}
                            </label>
                        </div>
                        <button class="btn btn-danger btn-sm" style={{zIndex:1, height:35, width:35}} onClick={() => this.props.onDelete(item.id)}><i class="bi bi-trash3"></i></button>
                    </li>
                )}
            };

            class TodoList extends React.Component {
                constructor(props) {
                    super(props);
                    this.state = {
                        hidden: true,
                        todos: JSON.parse(localStorage.getItem('todoItems')) || [],
                        newTodoName: ''
                    };
                }

                componentDidUpdate(prevProps, prevState) {
                    // Update localStorage whenever the todos state changes
                    if (prevState.todos !== this.state.todos) {
                        localStorage.setItem('todoItems', JSON.stringify(this.state.todos));
                    }
                }

                handleToggle = (id) => {
                    this.setState((prevState) => ({
                        todos: prevState.todos.map(todo =>
                            todo.id === id ? { ...todo, done: !todo.done } : todo
                        ),
                    }));
                };

                handleDelete = (id) => {
                    this.setState((prevState) => ({
                        todos: prevState.todos.filter(todo => todo.id !== id),
                    }));
                };

                handleAddTodo = () => {
                    const { newTodoName, todos } = this.state;
                    if (newTodoName.trim() === '') return; // Prevent adding empty todos

                    const newTodo = {
                        id: Date.now(),
                        name: capitalizeFirstLetter(String(newTodoName).trim()),
                        done: false,
                    };

                    this.setState((prevState) => ({
                        todos: [...prevState.todos, newTodo],
                        newTodoName: ''
                    }));
                };

                handleInputChange = (event) => {
                    this.setState({ newTodoName: event.target.value });
                };

                handleEnterKey = (event) => {
                    if (event.key === 'Enter') {
                        this.handleAddTodo();
                    }
                };

                handleToggleHidden = () => {
                    this.setState((prevState) => ({
                        hidden: !prevState.hidden,
                    }));
                };

                getDataListOptions = () => {
                    return [...new Set(this.state.todos.map(todo => todo.name))].sort()
                };

                render() {
                    return (
                        <div>
                        <ul class="list-group list-group-hover">
                            {this.state.todos.filter(todo => (todo.done === false)).map(todo => (
                                <TodoItem 
                                    key={todo.id} 
                                    item={todo} 
                                    onToggle={this.handleToggle}
                                    onDelete={this.handleDelete}
                                />
                            ))}
                        </ul>
                        <button class="btn btn-outline-secondary my-2" id="numItemsCompleted" onClick={this.handleToggleHidden}>
                            <i class={this.state.hidden ? 'bi bi-chevron-right':'bi bi-chevron-down'}></i> Completed {this.state.todos.filter(todo => (todo.done === true)).length}
                        </button>
                        {!this.state.hidden && (
                            <ul class="list-group list-group-hover">
                                {this.state.todos.filter(todo => (todo.done === true)).map(todo => (
                                    <TodoItem 
                                        key={todo.id} 
                                        item={todo} 
                                        onToggle={this.handleToggle} 
                                        onDelete={this.handleDelete} 
                                    />
                                ))}
                            </ul>
                        )}
                        <div class="fixed-bottom bg-dark" style={{height:55}}>
                            <div class="container input-group" style={{height:45}}>
                                <input 
                                    list="itemOptions" 
                                    type="text" 
                                    class="form-control bg-black" 
                                    placeholder="Add a new item..." 
                                    value={this.state.newTodoName} 
                                    onChange={this.handleInputChange}
                                    onKeyPress={this.handleEnterKey}
                                />
                                <datalist id="itemOptions">
                                    {this.getDataListOptions().map(opt => (
                                        <option value={opt}/>
                                    ))}
                                </datalist>
                                <button class="btn btn-secondary" type="button" id="saveButton" onClick={this.handleAddTodo}><i class="bi bi-file-arrow-up-fill"></i></button>
                            </div>
                        </div>
                        </div>
                    );
                }
            }

            const container = document.getElementById('mydiv');
            const root = ReactDOM.createRoot(container);
            root.render(<TodoList />)

        </script>

    </body>
</html>
